name: Normalize Public Mirror

on:
  push:
    branches: [master]
    paths:
      - '0[1-9]-*/**'
      - '1[0-9]-*/**'
      - '2[0-3]-*/**'
      - '99-Other/**'
      - 'README.md'
  workflow_dispatch:

jobs:
  normalize:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Normalize public mirror
        run: python3 scripts/normalize_public_mirror.py

      - name: Commit normalization changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -q -m "Normalize public mirror"
            git push
          fi
