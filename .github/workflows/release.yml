name: Release LLMX Bundle

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # Weekly, Monday 6am UTC

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-llmx-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-llmx-${{ runner.os }}-

      - name: Install llmx
        run: cargo install llmx

      - name: Index and export
        run: |
          INDEX_ID=$(llmx index . --json | jq -r '.index_id')
          llmx export "$INDEX_ID" --format llm.md -o llms.txt
          llmx export "$INDEX_ID" --format zip -o claude-wiki-llmx.zip

      - name: Set release tag
        id: tag
        run: echo "tag=v$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body: |
            Weekly LLMX bundle release.

            **Assets:**
            - `llms.txt` — tiered document outline for LLM ingestion
            - `claude-wiki-llmx.zip` — full searchable LLMX index bundle
          files: |
            llms.txt
            claude-wiki-llmx.zip
          make_latest: true
